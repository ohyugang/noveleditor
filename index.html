<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>웹 소설 편집기</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: #11131a;
      color: #f4f4f5;
    }

    .app {
      width: min(1400px, 94%);
      margin: 0 auto;
      padding: 48px 0;
    }

    .app-header {
      margin-bottom: 28px;
    }

    .eyebrow {
      color: #9ca3af;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 13px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.2;
    }

    .description {
      color: #c4c4c7;
      margin-top: 12px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.95fr);
      gap: 24px;
      align-items: start;
    }

    .editor-card,
    .preview-card {
      background: #1a1d29;
      border: 1px solid #2f3446;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .control-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
      padding: 18px;
      background: #141722;
      border: 1px solid #2f3446;
      border-radius: 16px;
    }

    .control-group {
      flex: 1;
      min-width: 180px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #d7d7dc;
      font-weight: 700;
    }

    select,
    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #3b4054;
      border-radius: 14px;
      background: #11131a;
      color: #ffffff;
      font-size: 16px;
      outline: none;
    }

    input {
      margin-bottom: 24px;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      min-height: 520px;
      padding: 18px;
      border: 1px solid #3b4054;
      border-radius: 14px;
      background: #11131a;
      color: #ffffff;
      font-size: 17px;
      line-height: 1.8;
      resize: vertical;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      color: #c4c4c7;
    }

    .status-row strong {
      color: #ffffff;
    }

    #saveStatus {
      margin: 0;
      color: #a7f3d0;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      background: #8b5cf6;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      background: #7c3aed;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    button.danger {
      background: #ef4444;
    }

    button.danger:hover {
      background: #dc2626;
    }

    .preview-card {
      position: sticky;
      top: 24px;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .preview-label {
      margin: 0 0 6px;
      color: #9ca3af;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .preview-header h2 {
      margin: 0;
      font-size: 24px;
    }

    .paper-badge {
      padding: 7px 10px;
      border: 1px solid #3b4054;
      border-radius: 999px;
      color: #d7d7dc;
      font-size: 13px;
      background: #141722;
    }

    .paper-preview {
      min-height: 720px;
      max-height: 760px;
      overflow-y: auto;
      padding: 42px 38px;
      background: #f8f5ef;
      color: #1f2937;
      border-radius: 8px;
      box-shadow: inset 0 0 0 1px rgba(17, 24, 39, 0.08);
    }

    #previewTitle {
      font-size: 24px;
      line-height: 1.4;
      text-align: center;
      margin: 0 0 32px;
      color: #111827;
    }

    #previewContent {
      white-space: pre-wrap;
      word-break: keep-all;
      color: #1f2937;
    }

    footer {
      margin-top: 20px;
      color: #8f93a3;
      font-size: 14px;
    }

    .pdf-notice {
      display: none;
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 1000000;
      padding: 14px 18px;
      border-radius: 14px;
      background: #111827;
      color: #ffffff;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      font-size: 14px;
    }

    .pdf-notice.active {
      display: block;
    }

    /*
      PDF로 캡처할 진짜 원고 영역.
      평소에는 화면에 안 보이고, PDF 만들 때만 JS가 body에 붙였다가 제거합니다.
    */
    .pdf-paper {
      width: 794px;
      min-height: 1123px;
      padding: 72px 64px;
      background: #ffffff;
      color: #000000;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    }

    .pdf-paper h1 {
      margin: 0 0 36px;
      text-align: center;
      font-size: 24px;
      line-height: 1.4;
      color: #000000;
    }

    .pdf-paper .pdf-content {
      white-space: pre-wrap;
      word-break: keep-all;
      color: #000000;
    }

    .pdf-capture-layer {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 999999;
      background: #ffffff;
      color: #000000;
    }

    @media (max-width: 1000px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .preview-card {
        position: static;
      }

      .paper-preview {
        min-height: 520px;
        max-height: 620px;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 32px;
      }

      .editor-card,
      .preview-card {
        padding: 20px;
      }

      textarea {
        min-height: 360px;
      }

      .button-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .paper-preview {
        padding: 28px 22px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="app-header">
      <p class="eyebrow">Novel Editor</p>
      <h1>웹 소설 편집기</h1>
      <p class="description">
        글을 쓰면 오른쪽 미리보기에 바로 반영되고, PDF는 여러 페이지로 저장됩니다.
      </p>
    </header>

    <main class="workspace">
      <section class="editor-card">
        <div class="control-panel">
          <div class="control-group">
            <label for="fontSizeInput">글꼴 크기</label>
            <select id="fontSizeInput">
              <option value="14">14px</option>
              <option value="15">15px</option>
              <option value="16">16px</option>
              <option value="17" selected>17px</option>
              <option value="18">18px</option>
              <option value="19">19px</option>
              <option value="20">20px</option>
              <option value="22">22px</option>
              <option value="24">24px</option>
            </select>
          </div>

          <div class="control-group">
            <label for="lineHeightInput">줄간격</label>
            <select id="lineHeightInput">
              <option value="1.4">1.4</option>
              <option value="1.5">1.5</option>
              <option value="1.6">1.6</option>
              <option value="1.7">1.7</option>
              <option value="1.8" selected>1.8</option>
              <option value="1.9">1.9</option>
              <option value="2">2.0</option>
            </select>
          </div>
        </div>

        <label for="titleInput">소설 제목</label>
        <input
          type="text"
          id="titleInput"
          placeholder="제목을 입력하세요"
        />

        <label for="contentInput">본문</label>
        <textarea
          id="contentInput"
          placeholder="여기에 소설을 작성하세요..."
        ></textarea>

        <div class="status-row">
          <div>
            <span>공백 포함 글자 수: </span>
            <strong id="charCount">0</strong>
          </div>

          <div>
            <span>공백 제외 글자 수: </span>
            <strong id="charCountNoSpace">0</strong>
          </div>

          <p id="saveStatus">준비 완료</p>
        </div>

        <div class="button-row">
          <button id="loadButton" type="button">저장된 글 불러오기</button>
          <button id="pdfButton" type="button">PDF 바로 저장</button>
          <button id="clearButton" type="button" class="danger">전체 삭제</button>
        </div>
      </section>

      <aside class="preview-card">
        <div class="preview-header">
          <div>
            <p class="preview-label">Preview</p>
            <h2>미리보기</h2>
          </div>
          <span class="paper-badge">A4</span>
        </div>

        <div class="paper-preview">
          <h1 id="previewTitle">제목 없는 소설</h1>
          <div id="previewContent">여기에 본문 미리보기가 표시됩니다.</div>
        </div>
      </aside>
    </main>

    <div id="pdfNotice" class="pdf-notice">
      PDF를 만드는 중입니다...
    </div>

    <footer>
      <p>
        PDF 저장 버튼을 누르면 원고가 이미지로 캡처되어 PDF로 저장됩니다.
      </p>
    </footer>
  </div>

  <!-- 화면 캡처용 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- PDF 생성용 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    const titleInput = document.getElementById("titleInput");
    const contentInput = document.getElementById("contentInput");

    const fontSizeInput = document.getElementById("fontSizeInput");
    const lineHeightInput = document.getElementById("lineHeightInput");

    const charCount = document.getElementById("charCount");
    const charCountNoSpace = document.getElementById("charCountNoSpace");
    const saveStatus = document.getElementById("saveStatus");

    const loadButton = document.getElementById("loadButton");
    const pdfButton = document.getElementById("pdfButton");
    const clearButton = document.getElementById("clearButton");

    const previewTitle = document.getElementById("previewTitle");
    const previewContent = document.getElementById("previewContent");
    const pdfNotice = document.getElementById("pdfNotice");

    const TITLE_KEY = "novelTitle";
    const CONTENT_KEY = "novelContent";
    const FONT_SIZE_KEY = "novelFontSize";
    const LINE_HEIGHT_KEY = "novelLineHeight";

    function updateCharCount() {
      const content = contentInput.value;
      charCount.textContent = content.length;
      charCountNoSpace.textContent = content.replace(/\s/g, "").length;
    }

    function applyStyle() {
      const fontSize = fontSizeInput.value + "px";
      const lineHeight = lineHeightInput.value;

      contentInput.style.fontSize = fontSize;
      contentInput.style.lineHeight = lineHeight;

      previewContent.style.fontSize = fontSize;
      previewContent.style.lineHeight = lineHeight;
    }

    function updatePreview() {
      const title = titleInput.value.trim();
      const content = contentInput.value;

      previewTitle.textContent = title || "제목 없는 소설";
      previewContent.textContent = content || "여기에 본문 미리보기가 표시됩니다.";

      applyStyle();
    }

    function saveNow() {
      localStorage.setItem(TITLE_KEY, titleInput.value);
      localStorage.setItem(CONTENT_KEY, contentInput.value);
      localStorage.setItem(FONT_SIZE_KEY, fontSizeInput.value);
      localStorage.setItem(LINE_HEIGHT_KEY, lineHeightInput.value);

      saveStatus.textContent = "저장됨";
    }

    function updateEverything() {
      updateCharCount();
      updatePreview();
      saveNow();
    }

    function loadNovel() {
      const savedTitle = localStorage.getItem(TITLE_KEY);
      const savedContent = localStorage.getItem(CONTENT_KEY);
      const savedFontSize = localStorage.getItem(FONT_SIZE_KEY);
      const savedLineHeight = localStorage.getItem(LINE_HEIGHT_KEY);

      if (savedTitle !== null) {
        titleInput.value = savedTitle;
      }

      if (savedContent !== null) {
        contentInput.value = savedContent;
      }

      if (savedFontSize !== null) {
        fontSizeInput.value = savedFontSize;
      }

      if (savedLineHeight !== null) {
        lineHeightInput.value = savedLineHeight;
      }

      updateCharCount();
      updatePreview();
      applyStyle();

      saveStatus.textContent = "저장된 글을 불러왔습니다.";
    }

    function makeSafeFileName(name) {
      return name.replace(/[\\/:*?"<>|]/g, "_");
    }

    function waitFrame() {
      return new Promise(function (resolve) {
        requestAnimationFrame(function () {
          requestAnimationFrame(resolve);
        });
      });
    }

    function createPdfPaper() {
      const title = titleInput.value.trim() || "제목 없는 소설";
      const content = contentInput.value || "";

      const layer = document.createElement("div");
      layer.className = "pdf-capture-layer";

      const paper = document.createElement("section");
      paper.className = "pdf-paper";

      const titleEl = document.createElement("h1");
      titleEl.textContent = title;

      const contentEl = document.createElement("div");
      contentEl.className = "pdf-content";
      contentEl.textContent = content;

      contentEl.style.fontSize = fontSizeInput.value + "px";
      contentEl.style.lineHeight = lineHeightInput.value;

      paper.appendChild(titleEl);
      paper.appendChild(contentEl);
      layer.appendChild(paper);

      document.body.appendChild(layer);

      return {
        layer: layer,
        paper: paper
      };
    }

    async function savePdf() {
      updateEverything();

      if (typeof html2canvas === "undefined") {
        alert("화면 캡처 기능을 불러오지 못했어요. 인터넷 연결을 확인해주세요.");
        return;
      }

      if (!window.jspdf || !window.jspdf.jsPDF) {
        alert("PDF 기능을 불러오지 못했어요. 인터넷 연결을 확인해주세요.");
        return;
      }

      pdfButton.disabled = true;
      pdfNotice.classList.add("active");
      saveStatus.textContent = "PDF 만드는 중...";

      const created = createPdfPaper();

      try {
        await waitFrame();

        const canvas = await html2canvas(created.paper, {
          scale: 2,
          backgroundColor: "#ffffff",
          useCORS: true,
          logging: false
        });

        const jsPDF = window.jspdf.jsPDF;

        const pageWidth = 794;
        const pageHeight = 1123;

        const pdf = new jsPDF({
          orientation: "portrait",
          unit: "px",
          format: [pageWidth, pageHeight]
        });

        const imgData = canvas.toDataURL("image/png");

        const imgWidth = pageWidth;
        const imgHeight = canvas.height * imgWidth / canvas.width;

        let position = 0;
        let pageNumber = 0;

        while (position < imgHeight) {
          if (pageNumber > 0) {
            pdf.addPage([pageWidth, pageHeight], "portrait");
          }

          pdf.addImage(
            imgData,
            "PNG",
            0,
            -position,
            imgWidth,
            imgHeight
          );

          position += pageHeight;
          pageNumber += 1;
        }

        const title = titleInput.value.trim() || "제목 없는 소설";
        const fileName = makeSafeFileName(title) + ".pdf";

        pdf.save(fileName);

        saveStatus.textContent = "PDF 저장 완료";
      } catch (error) {
        console.error(error);
        saveStatus.textContent = "PDF 저장 실패";
        alert("PDF 저장에 실패했어요.");
      } finally {
        created.layer.remove();
        pdfNotice.classList.remove("active");
        pdfButton.disabled = false;
      }
    }

    function clearAll() {
      const result = confirm("정말 전체 내용을 삭제할까요? 저장된 내용도 함께 삭제됩니다.");

      if (!result) {
        return;
      }

      titleInput.value = "";
      contentInput.value = "";
      fontSizeInput.value = "17";
      lineHeightInput.value = "1.8";

      localStorage.removeItem(TITLE_KEY);
      localStorage.removeItem(CONTENT_KEY);
      localStorage.removeItem(FONT_SIZE_KEY);
      localStorage.removeItem(LINE_HEIGHT_KEY);

      updateCharCount();
      updatePreview();
      applyStyle();

      saveStatus.textContent = "전체 삭제 완료";
    }

    titleInput.addEventListener("input", updateEverything);
    contentInput.addEventListener("input", updateEverything);

    titleInput.addEventListener("keyup", updateEverything);
    contentInput.addEventListener("keyup", updateEverything);

    titleInput.addEventListener("paste", function () {
      setTimeout(updateEverything, 0);
    });

    contentInput.addEventListener("paste", function () {
      setTimeout(updateEverything, 0);
    });

    titleInput.addEventListener("compositionend", updateEverything);
    contentInput.addEventListener("compositionend", updateEverything);

    fontSizeInput.addEventListener("change", updateEverything);
    lineHeightInput.addEventListener("change", updateEverything);

    loadButton.addEventListener("click", loadNovel);
    pdfButton.addEventListener("click", savePdf);
    clearButton.addEventListener("click", clearAll);

    loadNovel();
  </script>
</body>
</html>
