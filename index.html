<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>웹 소설 편집기</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap");

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Nanum Myeongjo", serif;
      background: #11131a;
      color: #f4f4f5;
    }

    .app {
      width: min(1400px, 94%);
      margin: 0 auto;
      padding: 48px 0;
    }

    .app-header {
      margin-bottom: 28px;
    }

    .eyebrow {
      color: #9ca3af;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 13px;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1.2;
    }

    .description {
      color: #c4c4c7;
      margin-top: 12px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(340px, 0.95fr);
      gap: 24px;
      align-items: start;
    }

    .editor-card,
    .preview-card {
      background: #1a1d29;
      border: 1px solid #2f3446;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    .control-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
      padding: 18px;
      background: #141722;
      border: 1px solid #2f3446;
      border-radius: 16px;
    }

    .control-group {
      flex: 1;
      min-width: 180px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #d7d7dc;
      font-weight: 700;
    }

    select,
    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #3b4054;
      border-radius: 14px;
      background: #11131a;
      color: #ffffff;
      font-family: "Nanum Myeongjo", serif;
      font-size: 16px;
      outline: none;
    }

    input {
      margin-bottom: 24px;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      min-height: 520px;
      padding: 18px;
      border: 1px solid #3b4054;
      border-radius: 14px;
      background: #11131a;
      color: #ffffff;
      font-family: "Nanum Myeongjo", serif;
      font-size: 16px;
      line-height: 1.8;
      resize: vertical;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      color: #c4c4c7;
    }

    .status-row strong {
      color: #ffffff;
    }

    #saveStatus {
      margin: 0;
      color: #a7f3d0;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      background: #8b5cf6;
      color: #ffffff;
      font-family: "Nanum Myeongjo", serif;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      background: #7c3aed;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    button.danger {
      background: #ef4444;
    }

    button.danger:hover {
      background: #dc2626;
    }

    .preview-card {
      position: sticky;
      top: 24px;
      max-height: calc(100vh - 48px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    .preview-label {
      margin: 0 0 6px;
      color: #9ca3af;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .preview-header h2 {
      margin: 0;
      font-size: 24px;
    }

    .paper-badge {
      padding: 7px 10px;
      border: 1px solid #3b4054;
      border-radius: 999px;
      color: #d7d7dc;
      font-size: 13px;
      background: #141722;
    }

    .image-preview-wrap {
      flex: 1;
      overflow-y: auto;
      padding-right: 6px;
    }

    .image-preview-empty {
      padding: 40px 24px;
      border: 1px dashed #3b4054;
      border-radius: 16px;
      color: #9ca3af;
      text-align: center;
      line-height: 1.7;
      background: #141722;
    }

    .preview-page {
      margin: 0 auto 22px;
      background: #ffffff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.32);
      width: min(100%, 360px);
    }

    .preview-page img {
      display: block;
      width: 100%;
      height: auto;
    }

    .preview-page-number {
      margin: -12px 0 22px;
      color: #9ca3af;
      text-align: center;
      font-size: 13px;
    }

    .save-notice {
      display: none;
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 1000000;
      padding: 14px 18px;
      border-radius: 14px;
      background: #111827;
      color: #ffffff;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      font-size: 14px;
    }

    .save-notice.active {
      display: block;
    }

    footer {
      margin-top: 20px;
      color: #8f93a3;
      font-size: 14px;
    }

    @media (max-width: 1000px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .preview-card {
        position: static;
        max-height: none;
      }

      .image-preview-wrap {
        max-height: 760px;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 32px;
      }

      .editor-card,
      .preview-card {
        padding: 20px;
      }

      textarea {
        min-height: 360px;
      }

      .button-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .preview-page {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="app-header">
      <p class="eyebrow">Novel Editor</p>
      <h1>웹 소설 편집기</h1>
      <p class="description">
        나눔명조로 글을 쓰고, 실제 PNG 이미지 형태로 미리본 뒤 A5 PNG로 저장할 수 있습니다.
      </p>
    </header>

    <main class="workspace">
      <section class="editor-card">
        <div class="control-panel">
          <div class="control-group">
            <label for="fontSizeInput">글꼴 크기</label>
            <select id="fontSizeInput">
              <option value="9">9pt</option>
              <option value="10">10pt</option>
              <option value="11">11pt</option>
              <option value="12" selected>12pt</option>
              <option value="13">13pt</option>
              <option value="14">14pt</option>
              <option value="15">15pt</option>
            </select>
          </div>

          <div class="control-group">
            <label for="lineHeightInput">줄간격</label>
            <select id="lineHeightInput">
              <option value="1.4">1.4</option>
              <option value="1.5">1.5</option>
              <option value="1.6">1.6</option>
              <option value="1.7">1.7</option>
              <option value="1.8" selected>1.8</option>
              <option value="1.9">1.9</option>
              <option value="2">2.0</option>
            </select>
          </div>

          <div class="control-group">
            <label for="marginInput">여백</label>
            <select id="marginInput">
              <option value="narrow">좁게</option>
              <option value="normal" selected>보통</option>
              <option value="wide">넓게</option>
            </select>
          </div>
        </div>

        <label for="titleInput">소설 제목</label>
        <input
          type="text"
          id="titleInput"
          placeholder="제목을 입력하세요"
        />

        <label for="contentInput">본문</label>
        <textarea
          id="contentInput"
          placeholder="여기에 소설을 작성하세요..."
        ></textarea>

        <div class="status-row">
          <div>
            <span>공백 포함 글자 수: </span>
            <strong id="charCount">0</strong>
          </div>

          <div>
            <span>공백 제외 글자 수: </span>
            <strong id="charCountNoSpace">0</strong>
          </div>

          <p id="saveStatus">준비 완료</p>
        </div>

        <div class="button-row">
          <button id="pngButton" type="button">A5 PNG 저장</button>
          <button id="clearButton" type="button" class="danger">전체 삭제</button>
        </div>
      </section>

      <aside class="preview-card">
        <div class="preview-header">
          <div>
            <p class="preview-label">Image Preview</p>
            <h2>이미지 미리보기</h2>
          </div>
          <span class="paper-badge">A5</span>
        </div>

        <div id="imagePreviewWrap" class="image-preview-wrap">
          <div class="image-preview-empty">
            글을 입력하면 이곳에 실제 저장될 PNG 이미지 미리보기가 표시됩니다.
          </div>
        </div>
      </aside>
    </main>

    <div id="saveNotice" class="save-notice">
      A5 PNG를 만드는 중입니다...
    </div>

    <footer>
      <p>
        저장된 글은 페이지를 열 때 자동으로 불러옵니다. 긴 글은 여러 장의 PNG 파일로 나뉘어 저장됩니다.
      </p>
    </footer>
  </div>

  <script>
    const titleInput = document.getElementById("titleInput");
    const contentInput = document.getElementById("contentInput");

    const fontSizeInput = document.getElementById("fontSizeInput");
    const lineHeightInput = document.getElementById("lineHeightInput");
    const marginInput = document.getElementById("marginInput");

    const charCount = document.getElementById("charCount");
    const charCountNoSpace = document.getElementById("charCountNoSpace");
    const saveStatus = document.getElementById("saveStatus");

    const pngButton = document.getElementById("pngButton");
    const clearButton = document.getElementById("clearButton");

    const imagePreviewWrap = document.getElementById("imagePreviewWrap");
    const saveNotice = document.getElementById("saveNotice");

    const TITLE_KEY = "novelTitle";
    const CONTENT_KEY = "novelContent";
    const FONT_SIZE_KEY = "novelFontSize";
    const LINE_HEIGHT_KEY = "novelLineHeight";
    const MARGIN_KEY = "novelMargin";

    const ALLOWED_FONT_SIZES = ["9", "10", "11", "12", "13", "14", "15"];
    const ALLOWED_MARGINS = ["narrow", "normal", "wide"];

    let previewTimer = null;
    let previewVersion = 0;

    function updateCharCount() {
      const content = contentInput.value;
      charCount.textContent = content.length;
      charCountNoSpace.textContent = content.replace(/\s/g, "").length;
    }

    function normalizeFontSize(value) {
      if (ALLOWED_FONT_SIZES.includes(value)) {
        return value;
      }

      return "12";
    }

    function normalizeMargin(value) {
      if (ALLOWED_MARGINS.includes(value)) {
        return value;
      }

      return "normal";
    }

    function applyEditorStyle() {
      const normalizedFontSize = normalizeFontSize(fontSizeInput.value);

      if (fontSizeInput.value !== normalizedFontSize) {
        fontSizeInput.value = normalizedFontSize;
      }

      const fontSizePx = Number(normalizedFontSize) * 1.35;
      const lineHeight = lineHeightInput.value;

      contentInput.style.fontSize = fontSizePx + "px";
      contentInput.style.lineHeight = lineHeight;
    }

    function saveNow() {
      const normalizedFontSize = normalizeFontSize(fontSizeInput.value);
      const normalizedMargin = normalizeMargin(marginInput.value);

      localStorage.setItem(TITLE_KEY, titleInput.value);
      localStorage.setItem(CONTENT_KEY, contentInput.value);
      localStorage.setItem(FONT_SIZE_KEY, normalizedFontSize);
      localStorage.setItem(LINE_HEIGHT_KEY, lineHeightInput.value);
      localStorage.setItem(MARGIN_KEY, normalizedMargin);

      saveStatus.textContent = "저장됨";
    }

    function updateEverything() {
      updateCharCount();
      applyEditorStyle();
      saveNow();
      scheduleImagePreview();
    }

    function loadNovelAutomatically() {
      const savedTitle = localStorage.getItem(TITLE_KEY);
      const savedContent = localStorage.getItem(CONTENT_KEY);
      const savedFontSize = localStorage.getItem(FONT_SIZE_KEY);
      const savedLineHeight = localStorage.getItem(LINE_HEIGHT_KEY);
      const savedMargin = localStorage.getItem(MARGIN_KEY);

      if (savedTitle !== null) {
        titleInput.value = savedTitle;
      }

      if (savedContent !== null) {
        contentInput.value = savedContent;
      }

      if (savedFontSize !== null) {
        const normalizedFontSize = normalizeFontSize(savedFontSize);
        fontSizeInput.value = normalizedFontSize;
        localStorage.setItem(FONT_SIZE_KEY, normalizedFontSize);
      } else {
        fontSizeInput.value = "12";
      }

      if (savedLineHeight !== null) {
        lineHeightInput.value = savedLineHeight;
      }

      if (savedMargin !== null) {
        const normalizedMargin = normalizeMargin(savedMargin);
        marginInput.value = normalizedMargin;
        localStorage.setItem(MARGIN_KEY, normalizedMargin);
      } else {
        marginInput.value = "normal";
      }

      updateCharCount();
      applyEditorStyle();
      scheduleImagePreview();

      saveStatus.textContent = "저장된 글 자동 불러오기 완료";
    }

    function makeSafeFileName(name) {
      return name.replace(/[\\/:*?"<>|]/g, "_");
    }

    function getCanvasMarginSettings(marginType) {
      const type = normalizeMargin(marginType);

      if (type === "narrow") {
        return {
          top: 130,
          bottom: 150,
          left: 130,
          right: 130
        };
      }

      if (type === "wide") {
        return {
          top: 210,
          bottom: 220,
          left: 190,
          right: 190
        };
      }

      return {
        top: 170,
        bottom: 185,
        left: 160,
        right: 160
      };
    }

    function getCanvasFontSize(ptSize) {
      return Number(ptSize) * 4;
    }

    function wrapTextByCanvas(ctx, text, maxWidth) {
      const lines = [];
      const paragraphs = text.replace(/\r/g, "").split("\n");

      paragraphs.forEach(function (paragraph) {
        if (paragraph.trim() === "") {
          lines.push("");
          return;
        }

        let currentLine = "";

        for (const char of paragraph) {
          const testLine = currentLine + char;
          const width = ctx.measureText(testLine).width;

          if (width > maxWidth && currentLine !== "") {
            lines.push(currentLine);
            currentLine = char;
          } else {
            currentLine = testLine;
          }
        }

        if (currentLine !== "") {
          lines.push(currentLine);
        }
      });

      return lines;
    }

    function drawPageBase(ctx, canvas) {
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawPageNumber(ctx, pageNumber, canvas, margin) {
      const pageText = String(pageNumber);
      const pageFontSize = 34;
      const bottomY = canvas.height - 90;

      ctx.font = `${pageFontSize}px "Nanum Myeongjo", serif`;
      ctx.fillStyle = "#333333";
      ctx.textBaseline = "top";

      if (pageNumber % 2 === 1) {
        const textWidth = ctx.measureText(pageText).width;
        const x = canvas.width - margin.right - textWidth;
        ctx.fillText(pageText, x, bottomY);
      } else {
        const x = margin.left;
        ctx.fillText(pageText, x, bottomY);
      }
    }

    function createCanvasPage() {
      const canvas = document.createElement("canvas");

      canvas.width = 1240;
      canvas.height = 1748;

      return canvas;
    }

    async function waitForNanumMyeongjo() {
      if (document.fonts) {
        await document.fonts.load('400 48px "Nanum Myeongjo"');
        await document.fonts.load('700 56px "Nanum Myeongjo"');
        await document.fonts.load('400 34px "Nanum Myeongjo"');
        await document.fonts.ready;
      }
    }

    async function createPngCanvases() {
      await waitForNanumMyeongjo();

      const title = titleInput.value.trim() || "제목 없는 소설";
      const content = contentInput.value || "";

      const margin = getCanvasMarginSettings(marginInput.value);

      const pageWidth = 1240;
      const pageHeight = 1748;

      const bodyFontPx = getCanvasFontSize(normalizeFontSize(fontSizeInput.value));
      const bodyLineHeight = bodyFontPx * Number(lineHeightInput.value);

      const titleFontPx = 56;
      const titleLineHeight = 78;

      const usableWidth = pageWidth - margin.left - margin.right;

      const measureCanvas = document.createElement("canvas");
      const measureCtx = measureCanvas.getContext("2d");

      measureCtx.font = `${bodyFontPx}px "Nanum Myeongjo", serif`;
      const bodyLines = wrapTextByCanvas(measureCtx, content, usableWidth);

      measureCtx.font = `700 ${titleFontPx}px "Nanum Myeongjo", serif`;
      const titleLines = wrapTextByCanvas(measureCtx, title, usableWidth);

      const pages = [];

      let pageIndex = 1;
      let canvas = createCanvasPage();
      let ctx = canvas.getContext("2d");

      drawPageBase(ctx, canvas);

      let y = margin.top;

      ctx.fillStyle = "#111111";
      ctx.textBaseline = "top";
      ctx.font = `700 ${titleFontPx}px "Nanum Myeongjo", serif`;

      for (const titleLine of titleLines) {
        const titleWidth = ctx.measureText(titleLine).width;
        const x = Math.max(margin.left, (pageWidth - titleWidth) / 2);

        ctx.fillText(titleLine, x, y);
        y += titleLineHeight;
      }

      y += 40;

      ctx.font = `${bodyFontPx}px "Nanum Myeongjo", serif`;
      ctx.fillStyle = "#111111";

      for (const line of bodyLines) {
        if (y + bodyLineHeight > pageHeight - margin.bottom) {
          drawPageNumber(ctx, pageIndex, canvas, margin);
          pages.push(canvas);

          pageIndex += 1;
          canvas = createCanvasPage();
          ctx = canvas.getContext("2d");

          drawPageBase(ctx, canvas);

          y = margin.top;

          ctx.textBaseline = "top";
          ctx.font = `${bodyFontPx}px "Nanum Myeongjo", serif`;
          ctx.fillStyle = "#111111";
        }

        if (line.trim() !== "") {
          ctx.fillText(line, margin.left, y);
        }

        y += bodyLineHeight;
      }

      drawPageNumber(ctx, pageIndex, canvas, margin);
      pages.push(canvas);

      return pages;
    }

    function scheduleImagePreview() {
      clearTimeout(previewTimer);

      previewTimer = setTimeout(function () {
        renderImagePreview();
      }, 250);
    }

    async function renderImagePreview() {
      const currentVersion = ++previewVersion;

      const title = titleInput.value.trim();
      const content = contentInput.value.trim();

      if (!title && !content) {
        imagePreviewWrap.innerHTML = `
          <div class="image-preview-empty">
            글을 입력하면 이곳에 실제 저장될 PNG 이미지 미리보기가 표시됩니다.
          </div>
        `;
        return;
      }

      imagePreviewWrap.innerHTML = `
        <div class="image-preview-empty">
          이미지 미리보기를 만드는 중입니다...
        </div>
      `;

      try {
        const canvases = await createPngCanvases();

        if (currentVersion !== previewVersion) {
          return;
        }

        imagePreviewWrap.innerHTML = "";

        canvases.forEach(function (canvas, index) {
          const pageBox = document.createElement("div");
          pageBox.className = "preview-page";

          const img = document.createElement("img");
          img.src = canvas.toDataURL("image/png");
          img.alt = `${index + 1}쪽 미리보기`;

          pageBox.appendChild(img);

          const pageLabel = document.createElement("div");
          pageLabel.className = "preview-page-number";
          pageLabel.textContent = `${index + 1}쪽`;

          imagePreviewWrap.appendChild(pageBox);
          imagePreviewWrap.appendChild(pageLabel);
        });
      } catch (error) {
        console.error(error);
        imagePreviewWrap.innerHTML = `
          <div class="image-preview-empty">
            이미지 미리보기를 만드는 중 오류가 발생했습니다.
          </div>
        `;
      }
    }

    function downloadCanvasAsPng(canvas, fileName) {
      const link = document.createElement("a");
      link.download = fileName;
      link.href = canvas.toDataURL("image/png");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    async function savePng() {
      updateCharCount();
      applyEditorStyle();
      saveNow();

      pngButton.disabled = true;
      saveNotice.classList.add("active");
      saveStatus.textContent = "A5 PNG 만드는 중...";

      try {
        const title = titleInput.value.trim() || "제목 없는 소설";
        const safeTitle = makeSafeFileName(title);

        const canvases = await createPngCanvases();

        canvases.forEach(function (canvas, index) {
          downloadCanvasAsPng(
            canvas,
            `${safeTitle}_A5_${String(index + 1).padStart(2, "0")}.png`
          );
        });

        saveStatus.textContent = `A5 PNG 저장 완료: ${canvases.length}장`;
      } catch (error) {
        console.error(error);
        saveStatus.textContent = "PNG 저장 실패";
        alert("PNG 저장에 실패했어요. 콘솔을 확인해주세요.");
      } finally {
        saveNotice.classList.remove("active");
        pngButton.disabled = false;
      }
    }

    function clearAll() {
      const result = confirm("정말 전체 내용을 삭제할까요? 저장된 내용도 함께 삭제됩니다.");

      if (!result) {
        return;
      }

      titleInput.value = "";
      contentInput.value = "";
      fontSizeInput.value = "12";
      lineHeightInput.value = "1.8";
      marginInput.value = "normal";

      localStorage.removeItem(TITLE_KEY);
      localStorage.removeItem(CONTENT_KEY);
      localStorage.removeItem(FONT_SIZE_KEY);
      localStorage.removeItem(LINE_HEIGHT_KEY);
      localStorage.removeItem(MARGIN_KEY);

      updateCharCount();
      applyEditorStyle();
      scheduleImagePreview();

      saveStatus.textContent = "전체 삭제 완료";
    }

    titleInput.addEventListener("input", updateEverything);
    contentInput.addEventListener("input", updateEverything);

    titleInput.addEventListener("keyup", updateEverything);
    contentInput.addEventListener("keyup", updateEverything);

    titleInput.addEventListener("paste", function () {
      setTimeout(updateEverything, 0);
    });

    contentInput.addEventListener("paste", function () {
      setTimeout(updateEverything, 0);
    });

    titleInput.addEventListener("compositionend", updateEverything);
    contentInput.addEventListener("compositionend", updateEverything);

    fontSizeInput.addEventListener("change", updateEverything);
    lineHeightInput.addEventListener("change", updateEverything);
    marginInput.addEventListener("change", updateEverything);

    pngButton.addEventListener("click", savePng);
    clearButton.addEventListener("click", clearAll);

    loadNovelAutomatically();
  </script>
</body>
